apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-service
  namespace: foodsave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: donation-service
  template:
    metadata:
      labels:
        app: donation-service
    spec:
      containers:
      - name: donation-service
        image: foodsave-app-donation-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
        env:
        - name: MONGODB_URI
          value: mongodb://mongodb-service:27017/foodsave
---
apiVersion: v1
kind: Service
metadata:
  name: donation-service
  namespace: foodsave
spec:
  selector:
    app: donation-service
  ports:
  - port: 3002
    targetPort: 3002
  type: ClusterIP
