apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: foodsave
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: foodsave-app-notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: foodsave
spec:
  selector:
    app: notification-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
